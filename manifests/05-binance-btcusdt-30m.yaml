apiVersion: v1
kind: ConfigMap
metadata:
  name: ftrade-minibot-binance-btcusdt-30m-env
  labels:
    app: ftrade-minibot
    exchange: "binance"
    pair: "BTCUSDT"
    timeframe: "30m"
data:
  EXCHANGE: "binance"
  SYMBOL: "BTCUSDT"
  INTERVAL: "30m"
  REMOTE_OPTIMIZER_PORT: "4500"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ftrade-minibot-binance-btcusdt-30m
  labels:
    app: ftrade-minibot
    exchange: "binance"
    pair: "BTCUSDT"
    timeframe: "30m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ftrade-minibot
      instance: "ftrade-minibot-binance-btcusdt-30m"
  template:
    metadata:
      labels:
        app: ftrade-minibot
        instance: "ftrade-minibot-binance-btcusdt-30m"
    spec:
      containers:
        - name: minibot
          image: "chaiya0899223232/ftrade-mini-bot:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ftrade-minibot-binance-btcusdt-30m-env
            - secretRef:
                name: ftrade-minibot-binance-secret
