name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'generate.js'
      - 'package.json'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to Docker Hub'
        required: true
        default: 'true'

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_IMAGE: ftrade-generator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event.inputs.push_to_registry == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | awk -F'"' '{print $4}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event.inputs.push_to_registry == 'true' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Verify image in Docker Hub
        if: github.event_name == 'push' || github.event.inputs.push_to_registry == 'true'
        run: |
          echo "✅ Image pushed successfully!"
          echo "Repository: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}"
          echo "Tags:"
          echo "  - latest"
          echo "  - ${{ steps.version.outputs.version }}"
          echo "  - ${{ github.sha }}"
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest"

  test-image:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.push_to_registry == 'true'

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and test image
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest

          echo "Testing image..."
          docker run --rm ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest --version 2>&1 || true

          echo "Verifying tools..."
          docker run --rm --entrypoint /bin/bash ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest -c \
            "echo '✅ Image verification:' && \
             node --version && \
             kubectl version --client 2>&1 | head -2 && \
             curl --version | head -1"
